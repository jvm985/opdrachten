services:
  api:
    build: ./server
    container_name: exam-api
    expose:
      - "3001"
    volumes:
      - ./server/data:/app/data
      - ./server/public/photos:/app/public/photos
    environment:
      - NODE_ENV=production
    restart: always

  frontend:
    image: nginx:alpine
    container_name: exam-frontend
    ports:
      - "127.0.0.1:8017:80"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client-teacher/dist:/usr/share/nginx/html/teacher:ro
      - ./client-student/dist:/usr/share/nginx/html/student:ro
    depends_on:
      - api
    restart: always
